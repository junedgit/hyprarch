### Monitor
  monitor = eDP-1, 1920x1080@60, 0x0, 1, cm, srgb

### My Apps
  $terminal = foot
  $fileManager = thunar
  $menu = fuzzel
  $browser = firefox
  $youtube = flatpak run rocks.shy.VacuumTube

### AutoStart
  exec-once = mako &
  exec-once = systemctl --user start hyprpolkitagent
  exec-once = hypridle
  exec-once = hyprsunset -t 5000 &
  exec-once = wl-paste --watch cliphist store &
  #exec-once = swaybg -i /home/juned/Pictures/walls/chill.jpeg &

### Env
  env = XDG_CURRENT_DESKTOP,Hyprland
  env = XDG_SESSION_TYPE,wayland
  env = XDG_SESSION_DESKTOP,Hyprland
  env = GDK_BACKEND,wayland,x11,*
  env = XCURSOR_SIZE,24

### Apperence
general {
  gaps_in = 0
  gaps_out = 0
  border_size = 1
  col.active_border = rgb(404663)
  col.inactive_border = rgb(1a1a1a)
  resize_on_border = false
  layout = dwindle
}

decoration {
  rounding = 4
  rounding_power = 2
  shadow {
    enabled = false
  }
  blur {
    enabled = false
  }
}

animations {
  enabled = yes, please :)
  bezier = easeOutQuart,0.25, 1, 0.5, 1
  bezier = easeOutQuint,0.22, 1, 0.36, 1
  animation = global, 1, 10, default
  animation = border, 1, 5, easeOutQuint
  animation = fade, 1, 5, easeOutQuint
  animation = layers, 1, 5, easeOutQuint
  animation = windows, 1, 5, easeOutQuint, slide
  animation = workspaces, 1, 7, easeOutQuart, slide
  workspace_wraparound = true
}

dwindle {
  force_split = 2
}

master {
  new_status = master
}

misc {
  force_default_wallpaper = 1
  disable_hyprland_logo = false 
  disable_splash_rendering = true
  focus_on_activate = true
  background_color = 0x0
}

input {
  kb_layout = us
  kb_options = shift:both_capslock, caps:super, ctrl:swap_lalt_lctl, ctrl:swap_ralt_rctl 
  follow_mouse = 1
  sensitivity = 0.5
  scroll_factor = 1
  touchpad {
    natural_scroll = false
    disable_while_typing = false
  }
}

cursor {
  inactive_timeout = 2
  hide_on_key_press = true
}

gesture = 3, horizontal, workspace
gestures {
  workspace_swipe_invert = false
}

### Bindings
$mainMod = SUPER
bind = $mainMod, R, exec, $menu
bind = $mainMod, Q, killactive,
bind = $mainMod, X, exit,
bind = $mainMod, C, exec, code
bind = $mainMod, V, togglefloating,
bind = $mainMod, T, exec, $terminal
bind = $mainMod, D, exec, kitty -d ~/my-space
bind = $mainMod, Y, exec, $youtube
bind = $mainMod, F, fullscreen
bind = $mainMod, B, exec, $browser
bind = $mainMod, P, exec, hyprpicker -a
bind = $mainMod, L, cyclenext
bind = $mainMod, J, workspace, e-1
bind = $mainMod, K, workspace, e+1

bind = $mainMod_SHIFT, F, exec, $fileManager
bind = $mainMod_SHIFT, R, exec, cliphist list | fuzzel --dmenu | cliphist decode | wl-copy

bind = , Print, exec, hyprshot -m output -o ~/Pictures/screenshots
bind = $mainMod, Print, exec, hyprshot -m window -o ~/Pictures/screenshots
bind = $mainMod_SHIFT, Print, exec, hyprshot -m region -o ~/Pictures/screenshots

bind = $mainMod_SHIFT, Q, exec, systemctl poweroff
bind = $mainMod_SHIFT, W, exec, systemctl reboot
bind = $mainMod_SHIFT, E, exec, systemctl suspend

workspace = 1, persistent:true
workspace = 2, persistent:true
workspace = 3, persistent:true
workspace = 4, persistent:true
workspace = 5, persistent:true

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e-1
bind = $mainMod, mouse_up, workspace, e+1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

bindel = ,XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindel = SHIFT, XF86AudioRaiseVolume, exec, brightnessctl set 5%+
bindel = SHIFT, XF86AudioLowerVolume, exec, brightnessctl set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

### windowrule
windowrule {
# Ignore maximize requests from all apps. You'll probably like this.
  name = suppress-maximize-events
  match:class = .*
  suppress_event = maximize
}

windowrule {
# Fix some dragging issues with XWayland
  name = fix-xwayland-drags
  match:class = ^$
  match:title = ^$
  match:xwayland = true
  match:float = true
  match:fullscreen = false
  match:pin = false
  no_focus = true
}

windowrule = float on, match:class imv
windowrule = float on, match:class mpv
windowrule = float on, match:class org.gnome.Evince
windowrule = float on, match:class org.pulseaudio.pavucontrol
windowrule = float on, match:class xdg-desktop-portal-gtk

